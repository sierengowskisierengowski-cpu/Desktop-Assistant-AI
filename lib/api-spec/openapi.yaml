      properties:
        id:
          type: integer
        hotkey:
          type: string
        aiMode:
          type: string
          enum: [local, cloud]
        aiModel:
          type: string
        cloudApiKey:
          type: ["string", "null"]
        cloudBaseUrl:
          type: ["string", "null"]
        ollamaBaseUrl:
          type: string
        theme:
          type: string
          enum: [light, dark, system]
        launchAtLogin:
          type: boolean
        startMinimized:
          type: boolean
        dismissOnBlur:
          type: boolean
        notifyOnSchedule:
          type: boolean
        notifyOnError:
          type: boolean
        windowWidth:
          type: integer
        windowHeight:
          type: integer
        onboardingCompleted:
          type: boolean

    AppSettingsUpdate:
      type: object
      properties:
        hotkey:
          type: string
        aiMode:
          type: string
          enum: [local, cloud]
        aiModel:
          type: string
        cloudApiKey:
          type: string
        cloudBaseUrl:
          type: string
        ollamaBaseUrl:
          type: string
        theme:
          type: string
          enum: [light, dark, system]
        launchAtLogin:
          type: boolean
        startMinimized:
          type: boolean
        dismissOnBlur:
          type: boolean
        notifyOnSchedule:
          type: boolean
        notifyOnError:
          type: boolean
        windowWidth:
          type: integer
        windowHeight:
          type: integer
        onboardingCompleted:
          type: boolean

    # ── AI Provider ──────────────────────────────────────────────────────────
    AiStatus:
      type: object
      required: [mode, ollamaAvailable, activeModel]
      properties:
        mode:
          type: string
          enum: [local, cloud]
        ollamaAvailable:
          type: boolean
        ollamaVersion:
          type: ["string", "null"]
        activeModel:
          type: string
        cloudConfigured:
          type: boolean

    AiModel:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [local, cloud]
        size:
          type: ["string", "null"]
        contextLength:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]

    ModelPullInput:
      type: object
      required: [name]
      properties:
        name:
          type: string

    ModelPullStatus:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        progress:
          type: ["number", "null"]
        total:
          type: ["integer", "null"]
        completed:
          type: ["integer", "null"]

    ModelPullProgress:
      type: object
      required: [name, status, progress]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [pulling, complete, error, unknown]
        progress:
          type: number
        total:
          type: integer
        completed:
          type: integer
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        error:
          type: ["string", "null"]

    # ── Files ────────────────────────────────────────────────────────────────
    FileScanInput:
      type: object
      required: [path]
      properties:
        path:
          type: string
        recursive:
          type: boolean
        maxDepth:
          type: integer

    FileScanResult:
      type: object
      required: [path, files, totalCount, totalSize]
      properties:
        path:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileEntry"
        totalCount:
          type: integer
        totalSize:
          type: integer

    FileEntry:
      type: object
      required: [name, path, size, modifiedAt, type]
      properties:
        name:
          type: string
        path:
          type: string
        size:
          type: integer
        modifiedAt:
          type: string
          format: date-time
        type:
          type: string
          enum: [file, directory]
        extension:
          type: ["string", "null"]

    FileOpPreviewInput:
      type: object
      required: [operation, path]
      properties:
        operation:
          type: string
          enum: [delete, move, organize, rename, dedup]
        path:
