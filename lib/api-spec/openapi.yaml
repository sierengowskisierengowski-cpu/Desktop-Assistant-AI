          type: string
        affectedFiles:
          type: array
          items:
            $ref: "#/components/schemas/FileEntry"
        summary:
          type: string
        totalSize:
          type: integer
        reversible:
          type: boolean

    FileOpExecuteInput:
      type: object
      required: [operation, path]
