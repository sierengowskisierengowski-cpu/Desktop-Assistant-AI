      properties:
        path:
          type: string
        label:
          type: string

    # ── System Stats ─────────────────────────────────────────────────────────
    SystemStats:
      type: object
      required: [cpu, memory, disk, uptime]
      properties:
        cpu:
          type: number
          description: CPU usage percentage
        memory:
          type: object
          required: [total, used, free, percent]
          properties:
            total:
              type: integer
            used:
              type: integer
            free:
              type: integer
            percent:
              type: number
        disk:
          type: array
          items:
            $ref: "#/components/schemas/DiskInfo"
        uptime:
          type: integer

    DiskInfo:
      type: object
      required: [mount, total, used, free, percent]
      properties:
        mount:
          type: string
        total:
          type: integer
        used:
          type: integer
        free:
          type: integer
        percent:
          type: number
