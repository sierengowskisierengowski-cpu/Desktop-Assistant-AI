kind = "web"
previewPath = "/"
title = "Desktop AI Assistant"
version = "1.0.0"
id = "artifacts/desktop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21098

[services.development]
run = "pnpm --filter @workspace/desktop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/desktop", "run", "build" ]
publicDir = "artifacts/desktop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21098"
BASE_PATH = "/"
